version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nse_market}
      POSTGRES_USER: ${POSTGRES_USER:-nse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nse_secure_pass_2024}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nse_user} -d ${POSTGRES_DB:-nse_market}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nse_network

  redis:
    image: redis:7-alpine
    container_name: nse_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_pass_2024} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secure_pass_2024}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nse_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: nse_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - nse_network
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 10s
      retries: 3

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: nse_ai_service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./ai-service/models:/app/models
      - ./logs:/app/logs
    networks:
      - nse_network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
    container_name: nse_frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - nse_network

  nginx:
    image: nginx:alpine
    container_name: nse_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - nse_network

volumes:
  postgres_data:
  redis_data:

networks:
  nse_network:
    driver: bridge
