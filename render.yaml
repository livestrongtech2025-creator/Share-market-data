# Render Blueprint — NSE Market Analytics Platform
# https://render.com/docs/blueprint-spec
#
# DEPLOYMENT ORDER:
#   1. Push this repo to GitHub
#   2. Create a new Blueprint on Render pointing to this repo
#   3. Render will provision: backend, ai-service, frontend
#   4. Set all database/Redis env vars manually in the Render dashboard (see sync: false below)
#   5. After nse-backend is live, copy its URL (e.g. https://nse-backend.onrender.com)
#   6. In Render dashboard → nse-frontend → Environment, set:
#        NEXT_PUBLIC_API_URL = https://nse-backend.onrender.com
#        NEXT_PUBLIC_WS_URL  = wss://nse-backend.onrender.com
#   7. Manually deploy (or redeploy) nse-frontend to pick up those values
#   8. Update CORS_ORIGINS on nse-backend to the frontend URL for production security

services:
  # ── NestJS Backend API ───────────────────────────────────────────────────────
  - type: web
    name: nse-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_SECRET
        generateValue: true
      # Allow all origins initially; tighten to frontend URL after first deploy
      - key: CORS_ORIGINS
        value: "*"

      # PostgreSQL — set these manually in the Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_SSL
        value: "true"

      # Redis — set these manually in the Render dashboard
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false

      # Auth
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d

      # AI service URL — set manually after nse-ai-service is deployed
      # e.g. https://nse-ai-service.onrender.com
      - key: AI_SERVICE_URL
        sync: false

      # NSE scraper settings
      - key: NSE_REQUEST_TIMEOUT
        value: 30000
      - key: NSE_RETRY_ATTEMPTS
        value: 3
      - key: NSE_RETRY_DELAY
        value: 5000
      - key: NSE_RATE_LIMIT_RPM
        value: 10
      - key: SCHEDULER_TIMEZONE
        value: Asia/Kolkata
      - key: SCHEDULER_CRON
        value: "0 20 * * 1-5"

      # Logging / rate-limiting
      - key: LOG_LEVEL
        value: info
      - key: THROTTLE_TTL
        value: 60
      - key: THROTTLE_LIMIT
        value: 100

      # Set these manually in the Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SLACK_WEBHOOK_URL
        sync: false

  # ── NSE Live-API Ingestion Cron (band hitters / VG / MAE) ────────────────────
  # Runs at 15:45 IST (10:15 UTC) every weekday — right after market close so
  # NSE's live endpoints still serve today's session. These endpoints DO NOT
  # serve historical days, so missing this window means losing the data.
  - type: cron
    name: nse-live-ingestion
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "15 10 * * 1-5"
    startCommand: node scripts/ingest-today.js
    envVars:
      - key: INGEST_MODE
        value: live
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_SSL
        value: "true"
      - key: NODE_ENV
        value: production

  # ── NSE Bhav Copy Ingestion Cron (EOD CSV) ───────────────────────────────────
  # Runs at 20:00 IST (14:30 UTC) every weekday — after NSE publishes the bhav
  # copy file (~19:00 IST). Unlike live APIs, the bhav copy CSV is always
  # archived, so this can also recover from a delayed run via DATE_OVERRIDE.
  - type: cron
    name: nse-bhav-ingestion
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    schedule: "30 14 * * 1-5"
    startCommand: node scripts/ingest-today.js
    envVars:
      - key: INGEST_MODE
        value: bhav
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_SSL
        value: "true"
      - key: NODE_ENV
        value: production

  # ── Python FastAPI AI Service ─────────────────────────────────────────────────
  - type: web
    name: nse-ai-service
    runtime: docker
    dockerfilePath: ./ai-service/Dockerfile
    dockerContext: ./ai-service
    plan: free
    healthCheckPath: /health
    envVars:
      # PostgreSQL & Redis — set these manually in the Render dashboard
      - key: DATABASE_URL
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        sync: false
      - key: REDIS_PASSWORD
        sync: false
      - key: LOG_LEVEL
        value: INFO

      # Set these manually in the Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  # ── Next.js Frontend ──────────────────────────────────────────────────────────
  - type: web
    name: nse-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: NEXT_PUBLIC_APP_NAME
        value: NSE Market Analytics
      # IMPORTANT: set these after nse-backend is deployed (see top of file)
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
