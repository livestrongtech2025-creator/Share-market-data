name: Daily NSE Ingestion (manual)

# NOTE: scheduled cron removed. GitHub Actions scheduled workflows routinely
# delay 7–9h under load, and by the time they fire post-midnight IST the NSE
# live APIs no longer serve "yesterday's" session — losing UBH/LBH/VG/MAE data.
# Production scheduling now lives in render.yaml (two crons: live + bhav).
# This workflow is kept ONLY for manual backfills via the Actions UI.
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: "Optional: run for a specific date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      ingest_mode:
        description: "Which sources to fetch: all / live / bhav"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - live
          - bhav

jobs:
  ingest:
    name: Fetch & store NSE data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Run ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          POSTGRES_SSL: "true"
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
          INGEST_MODE: ${{ github.event.inputs.ingest_mode }}
        run: node scripts/ingest-today.js
