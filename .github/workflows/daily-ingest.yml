name: Daily NSE Ingestion

on:
  schedule:
    # 13:00 UTC = 18:30 IST, Mon-Fri
    - cron: "0 13 * * 1-5"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      date_override:
        description: "Optional: run for a specific date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""

jobs:
  ingest:
    name: Fetch & store NSE data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Run ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          POSTGRES_SSL: "true"
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
        run: node scripts/ingest-today.js
