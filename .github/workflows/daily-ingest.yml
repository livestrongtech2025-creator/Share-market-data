name: Daily NSE Ingestion

# Primary scheduling lives in render.yaml (two crons: live + bhav). GitHub Actions
# schedules are kept here as a BACKUP — they routinely delay 7–9h under load, so
# they may miss the NSE live-API window (which only serves the current session).
# The bhav copy is archived and always recoverable, so the backup is reliable
# for that source even when delayed.
on:
  workflow_dispatch:
    inputs:
      date_override:
        description: "Optional: run for a specific date (YYYY-MM-DD). Leave blank for today."
        required: false
        default: ""
      ingest_mode:
        description: "Which sources to fetch: all / live / bhav"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - live
          - bhav
  schedule:
    # 15:45 IST (10:15 UTC) — mirror nse-live-ingestion cron in render.yaml
    - cron: "15 10 * * 1-5"
    # 20:00 IST (14:30 UTC) — mirror nse-bhav-ingestion cron in render.yaml
    - cron: "30 14 * * 1-5"

jobs:
  ingest:
    name: Fetch & store NSE data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci --omit=dev

      - name: Resolve ingest mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            case "${{ github.event.schedule }}" in
              "15 10 * * 1-5") echo "mode=live" >> "$GITHUB_OUTPUT" ;;
              "30 14 * * 1-5") echo "mode=bhav" >> "$GITHUB_OUTPUT" ;;
              *)               echo "mode=all"  >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "mode=${{ github.event.inputs.ingest_mode || 'all' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run ingestion
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.RENDER_DATABASE_URL }}
          POSTGRES_SSL: "true"
          DATE_OVERRIDE: ${{ github.event.inputs.date_override }}
          INGEST_MODE: ${{ steps.mode.outputs.mode }}
        run: node scripts/ingest-today.js
